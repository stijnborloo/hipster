<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#16151C">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hipster Kaartjes — Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#16151C;--paper:#F5EFE3;--mustard:#E8B33C;--raspberry:#D8456B;--teal:#2E8C83;--line:#3A3945}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--ink);color:var(--paper);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;text-align:center}
h1{font-family:'Archivo Black',sans-serif;font-size:clamp(22px,6vw,32px);letter-spacing:-0.02em;margin:8px 0 2px}
h1 .accent{color:var(--mustard)}
.sub{color:#9A97A6;font-size:13px;margin-bottom:18px}
.btn{font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;border:none;border-radius:10px;padding:14px 22px;cursor:pointer;background:var(--mustard);color:var(--ink);margin-top:14px}
.btn.pink{background:var(--raspberry);color:var(--paper)}
.btn.big{background:#1DB954;color:#0d0d0d;font-size:17px;text-decoration:none;display:inline-block}
.hint{font-size:12px;color:#807D8E;margin-top:12px;line-height:1.6;max-width:420px}
.err{color:var(--raspberry);font-size:14px;margin-top:10px}

/* scanner */
#scanView{display:none;width:100%;max-width:420px}
#scanView.active{display:block}
.camwrap{position:relative;width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;background:#000;border:1px solid var(--line)}
.camwrap video{width:100%;height:100%;object-fit:cover}
.camwrap .frame{position:absolute;inset:14%;border:3px solid var(--mustard);border-radius:14px;pointer-events:none;
  animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.9}50%{opacity:.4}}

/* speler */
#playView{display:none;width:100%;max-width:420px}
#playView.active{display:block}
.disc{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at center,var(--mustard) 0 12px,#0d0d12 13px 100%);border:3px solid #26252F;margin:6px auto 18px;animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.playerwrap{width:100%;border-radius:14px;overflow:hidden;position:relative;background:#0d0d12}
.playerwrap iframe{display:block;width:100%;height:152px;border:0}
.playerwrap .veil{position:absolute;inset:0;pointer-events:none;background:#0d0d12;
  -webkit-mask:radial-gradient(circle 34px at calc(100% - 44px) 50%, transparent 33px, #000 34px);
  mask:radial-gradient(circle 34px at calc(100% - 44px) 50%, transparent 33px, #000 34px);
  transition:opacity .4s ease}
.playerwrap .veiltext{position:absolute;left:16px;top:50%;transform:translateY(-50%);pointer-events:none;font-size:13px;color:var(--paper);text-align:left;line-height:1.5}
.playerwrap.revealed .veil,.playerwrap.revealed .veiltext{opacity:0}
.rowbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
</style>
</head>
<body>
<h1>HIPSTER<span class="accent">KAARTJES</span></h1>
<p class="sub">Scan een kaart en speel af — zonder te spieken.</p>

<div id="startView">
  <button class="btn" id="startBtn">📷 Start scanner</button>
  <p class="hint">Geef eenmalig toestemming voor de camera. Tip: voeg deze pagina toe aan je startscherm (menu → "Toevoegen aan startscherm") — dan werkt het als een echte app.</p>
  <p class="err" id="startErr"></p>
</div>

<div id="scanView">
  <div class="camwrap">
    <video id="video" playsinline muted></video>
    <div class="frame"></div>
  </div>
  <p class="hint">Richt op de QR-code van een kaartje.</p>
</div>

<div id="playView">
  <div class="disc"></div>
  <div id="playerSlot"></div>
  <div class="rowbtns">
    <button class="btn pink" id="revealBtn">Toon antwoord</button>
    <button class="btn" id="nextBtn">📷 Scan volgende kaart</button>
  </div>
  <p class="hint" id="playHint"></p>
</div>

<canvas id="cv" style="display:none"></canvas>

<script>
(function(){
const $=s=>document.querySelector(s);
let stream=null, scanning=false;
const video=$('#video'), cv=$('#cv'), ctx=cv.getContext('2d',{willReadFrequently:true});

function show(view){
  ['startView','scanView','playView'].forEach(v=>{
    const el=document.getElementById(v);
    el.style.display = (v===view) ? 'block':'none';
    el.classList.toggle('active', v===view);
  });
}

async function startScan(){
  $('#startErr').textContent='';
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:1280}},audio:false});
  }catch(e){
    $('#startErr').textContent='Camera niet beschikbaar of geweigerd. Controleer de toestemming in je browserinstellingen.';
    show('startView');
    return;
  }
  video.srcObject=stream;
  await video.play();
  show('scanView');
  scanning=true;
  requestAnimationFrame(tick);
}

function stopScan(){
  scanning=false;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  video.srcObject=null;
}

/* native browser-detectie indien beschikbaar, anders jsQR */
let detector=null;
if('BarcodeDetector' in window){
  try{ detector=new BarcodeDetector({formats:['qr_code']}); }catch(e){ detector=null; }
}

async function tick(){
  if(!scanning) return;
  try{
    if(video.readyState===video.HAVE_ENOUGH_DATA){
      let data=null;
      if(detector){
        const codes=await detector.detect(video);
        if(codes.length) data=codes[0].rawValue;
      }else if(typeof jsQR!=='undefined'){
        cv.width=video.videoWidth; cv.height=video.videoHeight;
        ctx.drawImage(video,0,0,cv.width,cv.height);
        const img=ctx.getImageData(0,0,cv.width,cv.height);
        const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
        if(code) data=code.data;
      }else{
        stopScan();
        $('#startErr').textContent='QR-bibliotheek kon niet laden. Controleer je internetverbinding en herlaad de pagina.';
        show('startView');
        return;
      }
      if(data){
        const card=parseCard(data);
        if(card){
          if(navigator.vibrate) navigator.vibrate(80);
          stopScan();
          showPlayer(card);
          return;
        }
      }
    }
  }catch(e){ /* frame overslaan, blijven scannen */ }
  requestAnimationFrame(tick);
}

/* herkent alle kaart-varianten */
function parseCard(data){
  let m=data.match(/[?&]t=([A-Za-z0-9]{15,})/);
  if(m) return {type:'track', id:m[1]};
  m=data.match(/open\.spotify\.com\/track\/([A-Za-z0-9]{15,})/);
  if(m) return {type:'track', id:m[1]};
  m=data.match(/[?&]q=([^&]+)/);
  if(m){
    try{
      const query=decodeURIComponent(escape(atob(m[1].replace(/-/g,'+').replace(/_/g,'/'))));
      return {type:'search', query};
    }catch(e){}
  }
  m=data.match(/open\.spotify\.com\/search\/([^?&]+)/);
  if(m){ try{ return {type:'search', query:decodeURIComponent(m[1])}; }catch(e){} }
  return null;
}

function showPlayer(card){
  const slot=$('#playerSlot');
  slot.innerHTML='';
  $('#playHint').textContent='';
  $('#revealBtn').style.display='inline-block';
  if(card.type==='track'){
    const wrap=document.createElement('div');
    wrap.className='playerwrap';
    wrap.innerHTML='<iframe src="https://open.spotify.com/embed/track/'+card.id+'?utm_source=generator&theme=0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>'+
      '<div class="veil"></div>'+
      '<div class="veiltext">▶ Druk op de play-knop<br>rechts in het gaatje →</div>';
    slot.appendChild(wrap);
    $('#revealBtn').onclick=()=>{ wrap.classList.add('revealed'); $('#revealBtn').style.display='none'; };
    $('#playHint').textContent='Speelt maar een stukje af? Log dan één keer in bij Spotify in deze browser voor volledige nummers.';
  }else{
    const a=document.createElement('a');
    a.className='btn big';
    a.textContent='▶ Open in Spotify (enkel DJ)';
    a.href='https://open.spotify.com/search/'+encodeURIComponent(card.query);
    a.target='_blank';
    slot.appendChild(a);
    $('#revealBtn').style.display='none';
    $('#playHint').textContent='Deze kaart opent Spotify via een zoekopdracht — enkel de DJ mag kijken. Kom daarna terug naar dit venster om verder te scannen.';
  }
  show('playView');
}

$('#startBtn').addEventListener('click', startScan);
$('#nextBtn').addEventListener('click', ()=>{ $('#playerSlot').innerHTML=''; startScan(); });
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) stopScan(); });
})();
</script>
</body>
</html>
