<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C4006B">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hipster Kaartjes — Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --magenta:#E6007E;
  --magenta-dark:#C4006B;
  --violet:#3A0B54;
  --violet-deep:#22062F;
  --yellow:#FFC93C;
  --cyan:#29D9D5;
  --white:#FFFFFF;
  --inkshadow:#1B0B24;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Archivo',system-ui,sans-serif;color:var(--white);
  background:linear-gradient(175deg,var(--magenta) 0%,var(--magenta-dark) 34%,var(--violet) 72%,var(--violet-deep) 100%);
  background-attachment:fixed;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:22px 20px 44px;text-align:center;
  overflow-x:hidden;position:relative;
}
/* confetti-laag */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:0}
.confetti span{position:absolute;font-size:26px;opacity:.14;color:var(--white);font-family:'Anton',sans-serif}
.confetti .c1{top:8%;left:8%;transform:rotate(-18deg)}
.confetti .c2{top:14%;right:10%;transform:rotate(14deg);color:var(--yellow)}
.confetti .c3{top:44%;left:4%;transform:rotate(10deg);color:var(--cyan)}
.confetti .c4{bottom:22%;right:6%;transform:rotate(-12deg)}
.confetti .c5{bottom:8%;left:14%;transform:rotate(20deg);color:var(--yellow)}
main{position:relative;z-index:1;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center}

/* wordmark als festivalsticker */
h1{
  font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(34px,9vw,48px);letter-spacing:.01em;line-height:.95;
  transform:rotate(-2deg);margin:6px 0 4px;
  text-shadow:3px 3px 0 var(--inkshadow);
  font-style:italic;
}
h1 .accent{color:var(--yellow)}
.sub{font-weight:700;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:22px}

/* chunky knoppen */
.btn{
  font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;letter-spacing:.05em;
  font-size:17px;border:none;border-radius:999px;padding:15px 28px;cursor:pointer;margin-top:16px;
  background:var(--yellow);color:var(--inkshadow);
  box-shadow:0 5px 0 var(--inkshadow);
  transition:transform .08s ease, box-shadow .08s ease;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--inkshadow)}
.btn.pink{background:var(--white);color:var(--magenta)}
.btn.green{background:var(--cyan);color:var(--inkshadow);text-decoration:none;display:inline-block}
.hint{font-size:12px;font-weight:500;color:rgba(255,255,255,.65);margin-top:14px;line-height:1.6;max-width:420px}
.hint strong{color:rgba(255,255,255,.9)}
.err{color:var(--yellow);font-weight:700;font-size:14px;margin-top:10px}

/* scanner */
#scanView{display:none;width:100%}
.camwrap{position:relative;width:100%;aspect-ratio:1;border-radius:22px;overflow:hidden;background:#000;
  border:4px solid var(--white);box-shadow:0 8px 0 var(--inkshadow);transform:rotate(-1deg)}
.camwrap video{width:100%;height:100%;object-fit:cover}
.camwrap .frame{position:absolute;inset:13%;border:4px solid var(--yellow);border-radius:16px;pointer-events:none;animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.95}50%{opacity:.35}}

/* speelscherm */
#playView{display:none;width:100%}
.disc{
  width:210px;height:210px;border-radius:50%;margin:14px auto 10px;position:relative;cursor:pointer;
  -webkit-tap-highlight-color:transparent;user-select:none;
  background:
    radial-gradient(circle at center,
      var(--yellow) 0 26px,
      var(--magenta) 26px 42px,
      var(--inkshadow) 42px 100%);
  box-shadow:0 10px 0 rgba(27,11,36,.55), inset 0 0 0 4px #000;
}
.disc::before{content:'';position:absolute;inset:14px;border-radius:50%;border:1px solid rgba(255,255,255,.14)}
.disc::after{content:'';position:absolute;inset:34px;border-radius:50%;border:1px solid rgba(255,255,255,.10)}
.disc.spinning{animation:spin 2.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.disc .icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:56px;color:var(--white);text-shadow:0 3px 0 var(--inkshadow)}
.playstate{font-family:'Anton',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:14px;color:var(--yellow);margin-bottom:4px;min-height:20px;text-shadow:1px 1px 0 var(--inkshadow)}
.progress{width:100%;max-width:260px;height:8px;background:rgba(255,255,255,.22);border-radius:5px;margin:14px auto 0;overflow:hidden}
.progress .bar{height:100%;width:0%;background:var(--yellow);border-radius:5px;transition:width .3s linear}
.rowbtns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px}

/* antwoordkaart: witte sticker */
.answer{display:none;margin:20px auto 0;max-width:340px;background:var(--white);color:var(--inkshadow);
  border-radius:18px;padding:18px;align-items:center;gap:14px;text-align:left;
  transform:rotate(1.5deg);box-shadow:0 8px 0 var(--inkshadow)}
.answer.show{display:flex}
.answer img{width:76px;height:76px;border-radius:10px;flex:none;background:#eee}
.answer .jaar{font-family:'Anton',sans-serif;font-size:34px;color:var(--magenta);line-height:1}
.answer .jaar .yearbtn{
  font-family:'Anton',sans-serif;font-size:15px;letter-spacing:.05em;text-transform:uppercase;
  background:var(--magenta);color:var(--white);border:none;border-radius:999px;padding:8px 16px;cursor:pointer;
  box-shadow:0 3px 0 var(--inkshadow);-webkit-tap-highlight-color:transparent;
}
.answer .jaar .yearbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--inkshadow)}
.answer .art{font-weight:800;font-size:14px;margin-top:5px;text-transform:uppercase;letter-spacing:.03em}
.answer .tit{font-size:13px;font-weight:500;color:#5a4a63}
#searchSlot{margin-top:8px}

/* toegangscode */
#lockView{width:100%;max-width:420px}
.pinbox{display:flex;gap:10px;justify-content:center;margin-top:18px}
.pinbox input{
  width:150px;text-align:center;font-family:'Anton',sans-serif;font-size:26px;letter-spacing:.35em;
  background:var(--white);color:var(--inkshadow);border:none;border-radius:14px;padding:14px 10px 14px 16px;
  box-shadow:0 5px 0 var(--inkshadow);outline:none;
}
.pinbox input:focus-visible{box-shadow:0 5px 0 var(--inkshadow),0 0 0 3px var(--yellow)}
#lockView.shake .pinbox{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}

@media (prefers-reduced-motion: reduce){
  .disc.spinning{animation:none}
  .camwrap .frame{animation:none}
}
</style>
</head>
<body>
<div class="confetti" aria-hidden="true">
  <span class="c1">♪</span><span class="c2">♫</span><span class="c3">▲</span><span class="c4">♪</span><span class="c5">●</span>
</div>
<main>
<h1>HIPSTER<span class="accent">KAARTJES</span></h1>
<p class="sub">Scan · Raad · Speel</p>

<div id="lockView">
  <p class="playstate" style="margin-top:10px">Voer de toegangscode in</p>
  <div class="pinbox">
    <input type="tel" id="pinInput" inputmode="numeric" maxlength="6" autocomplete="off" placeholder="••••">
  </div>
  <button class="btn" id="pinBtn">Ontgrendel</button>
  <p class="err" id="pinErr"></p>
</div>

<div id="startView" style="display:none">
  <button class="btn" id="startBtn">📷 Start scanner</button>
  <p class="hint">Geef eenmalig toestemming voor de camera. <strong>Tip:</strong> voeg deze pagina toe aan je startscherm (menu → "Toevoegen aan startscherm") — dan werkt het als een echte app.</p>
  <p class="err" id="startErr"></p>
</div>

<div id="scanView">
  <div class="camwrap">
    <video id="video" playsinline muted></video>
    <div class="frame"></div>
  </div>
  <p class="hint">Richt op de QR-code van een kaartje.</p>
</div>

<div id="playView">
  <div class="disc" id="disc"><div class="icon" id="discIcon">▶</div></div>
  <p class="playstate" id="playState">Laden…</p>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div class="answer" id="answerBox">
    <img id="ansArt" alt="">
    <div>
      <div class="jaar" id="ansYear"></div>
      <div class="art" id="ansArtist"></div>
      <div class="tit" id="ansTitle"></div>
    </div>
  </div>
  <div id="searchSlot"></div>
  <div class="rowbtns">
    <button class="btn pink" id="revealBtn">Toon antwoord</button>
    <button class="btn" id="nextBtn">📷 Volgende kaart</button>
  </div>
  <p class="hint" id="playHint"></p>
</div>
</main>

<canvas id="cv" style="display:none"></canvas>

<script>
(function(){
const $=s=>document.querySelector(s);
let stream=null, scanning=false;
const video=$('#video'), cv=$('#cv'), ctx=cv.getContext('2d',{willReadFrequently:true});

function show(view){
  ['lockView','startView','scanView','playView'].forEach(v=>{
    document.getElementById(v).style.display = (v===view)?'block':'none';
  });
}

/* ---------- toegangscode ---------- */
const PIN='2468'; // ← verander hier de toegangscode
const PIN_LS='hipster_unlocked';
function checkPin(){
  const v=$('#pinInput').value.trim();
  if(v===PIN){
    localStorage.setItem(PIN_LS,'1');
    $('#pinErr').textContent='';
    show('startView');
  }else{
    $('#pinErr').textContent='Verkeerde code — probeer opnieuw.';
    $('#pinInput').value='';
    const lv=document.getElementById('lockView');
    lv.classList.remove('shake'); void lv.offsetWidth; lv.classList.add('shake');
    if(navigator.vibrate) navigator.vibrate([60,40,60]);
  }
}
$('#pinBtn').addEventListener('click', checkPin);
$('#pinInput').addEventListener('keydown', e=>{ if(e.key==='Enter') checkPin(); });
if(localStorage.getItem(PIN_LS)==='1'){ show('startView'); }
else{ show('lockView'); }

/* ---------- audio-speler (30s preview) ---------- */
const audio=new Audio();
audio.preload='auto';
let meta=null; // {artist,title,year,artwork,previewUrl}

audio.addEventListener('play', ()=>setDisc(true));
audio.addEventListener('pause', ()=>setDisc(false));
audio.addEventListener('ended', ()=>{ setDisc(false); $('#bar').style.width='0%'; });
audio.addEventListener('timeupdate', ()=>{
  if(audio.duration) $('#bar').style.width=(audio.currentTime/audio.duration*100)+'%';
});
function setDisc(playing){
  $('#discIcon').textContent = playing?'❚❚':'▶';
  $('#disc').classList.toggle('spinning', playing);
  $('#playState').textContent = playing?'Speelt af…':(meta&&meta.previewUrl?'Tik op de plaat':$('#playState').textContent);
}

$('#disc').addEventListener('click', ()=>{
  if(!meta||!meta.previewUrl){ return; }
  if(audio.paused) audio.play().catch(()=>{ $('#playState').textContent='Geblokkeerd — tik nog eens'; });
  else audio.pause();
});

/* ---------- metadata + preview zoeken ---------- */
async function itunesSearch(term){
  const url='https://itunes.apple.com/search?media=music&entity=song&limit=5&country=BE&term='+encodeURIComponent(term);
  const res=await fetch(url);
  if(!res.ok) throw new Error('zoeken mislukt');
  const d=await res.json();
  const hit=(d.results||[]).find(r=>r.previewUrl);
  if(!hit) return null;
  return {
    artist:hit.artistName, title:hit.trackName,
    year:(hit.releaseDate||'').slice(0,4),
    artwork:(hit.artworkUrl100||'').replace('100x100','200x200'),
    previewUrl:hit.previewUrl
  };
}
async function spotifyTitle(id){
  try{
    const res=await fetch('https://open.spotify.com/oembed?url='+encodeURIComponent('https://open.spotify.com/track/'+id));
    if(!res.ok) return null;
    const d=await res.json();
    return d.title||null;
  }catch(e){ return null; }
}

async function loadCard(card){
  meta=null;
  audio.pause(); audio.removeAttribute('src');
  $('#bar').style.width='0%';
  $('#answerBox').classList.remove('show');
  $('#searchSlot').innerHTML='';
  $('#playHint').textContent='';
  $('#revealBtn').style.display='inline-block';
  $('#discIcon').textContent='▶';
  $('#disc').classList.remove('spinning');
  $('#playState').textContent='Nummer laden…';
  show('playView');

  let term=card.query||null;
  if(!term && card.id){
    $('#playState').textContent='Nummer opzoeken…';
    term=await spotifyTitle(card.id);
  }
  let found=null;
  if(term){
    try{ found=await itunesSearch(term); }catch(e){}
  }
  if(found){
    meta=found;
    audio.src=meta.previewUrl;
    $('#playState').textContent='Tik op de plaat';
  }else{
    $('#playState').textContent='Geen fragment gevonden';
    const a=document.createElement('a');
    a.className='btn green';
    a.textContent='▶ Open in Spotify (enkel DJ)';
    a.href = card.id ? 'https://open.spotify.com/track/'+card.id
                     : 'https://open.spotify.com/search/'+encodeURIComponent(card.query||'');
    a.target='_blank';
    $('#searchSlot').appendChild(a);
    $('#playHint').textContent='Dit nummer zit niet in de preview-catalogus — open het via Spotify (enkel de DJ kijkt).';
  }
}

$('#revealBtn').addEventListener('click', ()=>{
  if(meta){
    $('#ansArt').src=meta.artwork||'';
    $('#ansArtist').textContent=meta.artist||'';
    $('#ansTitle').textContent=meta.title||'';
    const jr=$('#ansYear');
    jr.textContent='';
    const yb=document.createElement('button');
    yb.className='yearbtn';
    yb.textContent='🔒 Toon jaartal';
    yb.addEventListener('click', ()=>{ jr.textContent=meta.year||'????'; });
    jr.appendChild(yb);
    $('#answerBox').classList.add('show');
    $('#revealBtn').style.display='none';
    $('#playHint').textContent='Het getoonde jaartal is de releasedatum volgens iTunes — het kaartje zelf blijft de scheidsrechter.';
  }
});

/* ---------- scanner ---------- */
async function startScan(){
  $('#startErr').textContent='';
  audio.pause();
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:1280}},audio:false});
  }catch(e){
    $('#startErr').textContent='Camera niet beschikbaar of geweigerd. Controleer de toestemming in je browserinstellingen.';
    show('startView');
    return;
  }
  video.srcObject=stream;
  await video.play();
  show('scanView');
  scanning=true;
  requestAnimationFrame(tick);
}
function stopScan(){
  scanning=false;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  video.srcObject=null;
}

let detector=null;
if('BarcodeDetector' in window){
  try{ detector=new BarcodeDetector({formats:['qr_code']}); }catch(e){ detector=null; }
}

async function tick(){
  if(!scanning) return;
  try{
    if(video.readyState===video.HAVE_ENOUGH_DATA){
      let data=null;
      if(detector){
        const codes=await detector.detect(video);
        if(codes.length) data=codes[0].rawValue;
      }else if(typeof jsQR!=='undefined'){
        cv.width=video.videoWidth; cv.height=video.videoHeight;
        ctx.drawImage(video,0,0,cv.width,cv.height);
        const img=ctx.getImageData(0,0,cv.width,cv.height);
        const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
        if(code) data=code.data;
      }else{
        stopScan();
        $('#startErr').textContent='QR-bibliotheek kon niet laden. Controleer je internetverbinding en herlaad de pagina.';
        show('startView');
        return;
      }
      if(data){
        const card=parseCard(data);
        if(card){
          if(navigator.vibrate) navigator.vibrate(80);
          stopScan();
          loadCard(card);
          return;
        }
      }
    }
  }catch(e){}
  requestAnimationFrame(tick);
}

function parseCard(data){
  const card={};
  let m=data.match(/[?&]t=([A-Za-z0-9]{15,})/);
  if(m) card.id=m[1];
  m=data.match(/open\.spotify\.com\/track\/([A-Za-z0-9]{15,})/);
  if(m) card.id=m[1];
  m=data.match(/[?&]q=([^&]+)/);
  if(m){
    try{ card.query=decodeURIComponent(escape(atob(m[1].replace(/-/g,'+').replace(/_/g,'/')))); }catch(e){}
  }
  m=data.match(/open\.spotify\.com\/search\/([^?&]+)/);
  if(m){ try{ card.query=decodeURIComponent(m[1]); }catch(e){} }
  return (card.id||card.query)?card:null;
}

$('#startBtn').addEventListener('click', startScan);
$('#nextBtn').addEventListener('click', startScan);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden){ stopScan(); audio.pause(); } });
})();
</script>
</body>
</html>
